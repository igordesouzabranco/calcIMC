<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <nav class="nav">
        <h1 class="nav-title">Calculadora de IMC</h1>
    </nav>
    <section class="container">
        <h1 class="section-title">Tabela de IMC</h1>
        <table class="imc">
            <thead class="cabecalho">
                <tr>
                    <th class="title-table">IMC</th>
                    <th class="title-table">Resultado</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Menos do que <b>18,5</b></td>
                    <td>Abaixo do peso</td>
                </tr>
                <tr>
                    <td>Entre <b>18,6</b> e <b>24,9</b></td>
                    <td>Peso normal</td>
                </tr>
                <tr>
                    <td>Entre <b>25</b> e <b>29,9</b></td>
                    <td class="danger">Sobrepeso</td>
                </tr>
                <tr>
                    <td>Entre <b>30</b> e <b>34,9</b></td>
                    <td class="bad-text">Obesidade grau I</td>
                </tr>
                <tr>
                    <td>Entre <b>35</b> e <b>39,9</b></td>
                    <td class="bad-text">Obesidade grau II</td>
                </tr>
                <tr>
                    <td>Mais do que <b>40</b></td>
                    <td class="bad-text">Obesidade grau III</td>
                </tr>
            </tbody>
        </table>
        <h1 class="text-form">Calcule seu IMC</h1>
        <form action="" class="formImc" id="formImc">
            <label for="input-peso" class="field-label">Peso:</label>
            <input type="number" id="peso" placeholder="Digite seu peso...">

            <label for="input-altura" class="field-label">Altura (Em metros):</label>
            <input type="number" step="0.01" id="altura" placeholder="Digite sua altura em metros...">

            <button type="submit" class="buttom-submit">Enviar</button>
        </form>
        <p id="resultadoTexto"></p>
    </section>
    <input type="checkbox" id="darkmode-switch">
    <label class="darkmode" for="darkmode-switch">
    <svg class="darkmode-icon-moon" width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
            d="M13 6V3M18.5 12V7M14.5 4.5H11.5M21 9.5H16M15.5548 16.8151C16.7829 16.8151 17.9493 16.5506 19 16.0754C17.6867 18.9794 14.7642 21 11.3698 21C6.74731 21 3 17.2527 3 12.6302C3 9.23576 5.02061 6.31331 7.92462 5C7.44944 6.05072 7.18492 7.21708 7.18492 8.44523C7.18492 13.0678 10.9322 16.8151 15.5548 16.8151Z"
            stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <svg class="darkmode-icon-sun" width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="5" stroke="#000000" stroke-width="2" />
        <path d="M12 2V4M12 20V22M2 12H4M20 12H22M5.64 5.64L7.05 7.05M16.95 16.95L18.36 18.36M5.64 18.36L7.05 16.95M16.95 7.05L18.36 5.64"
            stroke="#000000" stroke-width="2" stroke-linecap="round" />
    </svg>
    </label>

    <script src="./assets/js/main.js"></script>
</body>

</html>
